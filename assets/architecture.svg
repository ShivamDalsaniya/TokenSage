<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0b0d11" rx="12"/>

  <!-- ── USER ── -->
  <g transform="translate(40,200)">
    <rect width="110" height="120" rx="10" fill="#1a1f2e" stroke="#374151" stroke-width="1.5"/>
    <!-- person icon -->
    <circle cx="55" cy="32" r="18" fill="none" stroke="#6b7280" stroke-width="2"/>
    <path d="M20 90 Q55 65 90 90" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
    <text x="55" y="108" text-anchor="middle" fill="#9ca3af" font-size="12" font-weight="600">Developer</text>
  </g>

  <!-- arrows: user ↔ AI Client -->
  <g fill="#6b7280" stroke="#6b7280">
    <line x1="152" y1="242" x2="215" y2="242" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="215" y1="260" x2="152" y2="260" stroke-width="1.5" marker-end="url(#arr2)"/>
    <text x="183" y="235" text-anchor="middle" fill="#6b7280" font-size="10">prompts</text>
    <text x="183" y="278" text-anchor="middle" fill="#6b7280" font-size="10">responses</text>
  </g>

  <!-- ── AI CLIENT ── -->
  <g transform="translate(215,160)">
    <rect width="155" height="200" rx="10" fill="#1a1f2e" stroke="#374151" stroke-width="1.5"/>
    <text x="77" y="24" text-anchor="middle" fill="#f9fafb" font-size="13" font-weight="700">AI Client</text>
    <!-- Anthropic starburst -->
    <g transform="translate(35,80)">
      <g transform="translate(0,0)">
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(0)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(45)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(90)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(135)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(180)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(225)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(270)"/>
        <rect x="-4" y="-22" width="8" height="14" rx="4" fill="#e8784d" transform="rotate(315)"/>
      </g>
    </g>
    <!-- OpenAI circle -->
    <circle cx="77" cy="80" r="22" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <circle cx="77" cy="80" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <!-- Cursor arrow -->
    <g transform="translate(118,58)">
      <path d="M0 0 L28 16 L14 20 L10 34 Z" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="35" y="134" text-anchor="middle" fill="#6b7280" font-size="9">Claude Code</text>
    <text x="77" y="134" text-anchor="middle" fill="#6b7280" font-size="9">Codex</text>
    <text x="120" y="134" text-anchor="middle" fill="#6b7280" font-size="9">Cursor</text>
    <text x="77" y="170" text-anchor="middle" fill="#6b7280" font-size="9">+ Cline, Gemini CLI, Roo Code…</text>
  </g>

  <!-- arrows: AI Client ↔ TokenSage -->
  <g>
    <line x1="372" y1="232" x2="435" y2="232" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="0"/>
    <line x1="435" y1="252" x2="372" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr2)"/>
    <text x="403" y="224" text-anchor="middle" fill="#6b7280" font-size="10">tool call</text>
    <text x="403" y="270" text-anchor="middle" fill="#6b7280" font-size="10">result</text>
  </g>

  <!-- ── TOKENSAGE BOX ── -->
  <g transform="translate(435,60)">
    <rect width="420" height="400" rx="12" fill="#0f1521" stroke="#10b981" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="420" height="44" rx="12" fill="#10b981" fill-opacity="0.12"/>
    <rect x="0" y="30" width="420" height="14" fill="#10b981" fill-opacity="0.12"/>
    <!-- TokenSage starburst icon -->
    <g transform="translate(22,22)">
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(0)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(45)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(90)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(135)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(180)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(225)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(270)"/>
      <rect x="-3.5" y="-12" width="7" height="9" rx="3.5" fill="#10b981" transform="rotate(315)"/>
    </g>
    <text x="40" y="16" fill="#10b981" font-size="14" font-weight="700">Token</text>
    <text x="89" y="16" fill="#3b82f6" font-size="14" font-weight="700">Sage</text>
    <text x="155" y="16" fill="#6b7280" font-size="12"> MCP Server</text>

    <!-- ── HOOKS PANEL ── -->
    <g transform="translate(16,58)">
      <rect width="185" height="168" rx="8" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
      <text x="92" y="20" text-anchor="middle" fill="#f9fafb" font-size="11" font-weight="700">Hooks (Auto)</text>
      <text x="92" y="34" text-anchor="middle" fill="#6b7280" font-size="9">Transparent — no prompt changes needed</text>

      <rect x="12" y="44" width="161" height="24" rx="5" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
      <text x="92" y="60" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">auto_compress_read</text>

      <rect x="12" y="74" width="161" height="24" rx="5" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="92" y="90" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">edit_operation (diff tracking)</text>

      <rect x="12" y="104" width="161" height="24" rx="5" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="92" y="120" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">post_bash (output trim)</text>

      <rect x="12" y="134" width="161" height="24" rx="5" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
      <text x="92" y="150" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">user_prompt (compress)</text>
    </g>

    <!-- ── MCP TOOLS PANEL ── -->
    <g transform="translate(214,58)">
      <rect width="190" height="168" rx="8" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
      <text x="95" y="20" text-anchor="middle" fill="#f9fafb" font-size="11" font-weight="700">MCP Tools</text>
      <text x="95" y="34" text-anchor="middle" fill="#6b7280" font-size="9">Call explicitly for deeper savings</text>

      <rect x="12" y="44" width="166" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="95" y="57" text-anchor="middle" fill="#9ca3af" font-size="10">compress_file / compress_directory</text>

      <rect x="12" y="68" width="166" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="95" y="81" text-anchor="middle" fill="#9ca3af" font-size="10">summarize_logs / summarize_conversation</text>

      <rect x="12" y="92" width="166" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="95" y="105" text-anchor="middle" fill="#9ca3af" font-size="10">detect_duplicates</text>

      <rect x="12" y="116" width="166" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="95" y="129" text-anchor="middle" fill="#9ca3af" font-size="10">semantic_relevance</text>

      <rect x="12" y="140" width="166" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="95" y="153" text-anchor="middle" fill="#9ca3af" font-size="10">context_budget / token_usage_report</text>
    </g>

    <!-- ── DASHBOARD PANEL ── -->
    <g transform="translate(16,242)">
      <rect width="388" height="142" rx="8" fill="#1a1f2e" stroke="#374151" stroke-width="1"/>
      <text x="194" y="22" text-anchor="middle" fill="#f9fafb" font-size="11" font-weight="700">Real-time Dashboard  •  localhost:7450</text>

      <!-- mini stat cards -->
      <g transform="translate(12,36)">
        <rect width="82" height="44" rx="6" fill="#0b0d11" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
        <text x="41" y="16" text-anchor="middle" fill="#6b7280" font-size="8" font-weight="600">TOKENS SAVED</text>
        <text x="41" y="34" text-anchor="middle" fill="#10b981" font-size="16" font-weight="700">167k</text>
      </g>
      <g transform="translate(102,36)">
        <rect width="82" height="44" rx="6" fill="#0b0d11" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
        <text x="41" y="16" text-anchor="middle" fill="#6b7280" font-size="8" font-weight="600">OPTIMIZATION</text>
        <text x="41" y="34" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="700">99%</text>
      </g>
      <g transform="translate(192,36)">
        <rect width="82" height="44" rx="6" fill="#0b0d11" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
        <text x="41" y="16" text-anchor="middle" fill="#6b7280" font-size="8" font-weight="600">REQUESTS</text>
        <text x="41" y="34" text-anchor="middle" fill="#8b5cf6" font-size="16" font-weight="700">14</text>
      </g>
      <g transform="translate(282,36)">
        <rect width="94" height="44" rx="6" fill="#0b0d11" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
        <text x="47" y="16" text-anchor="middle" fill="#6b7280" font-size="8" font-weight="600">TIME SAVED</text>
        <text x="47" y="34" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="700">9.3h</text>
      </g>

      <!-- token meter -->
      <rect x="12" y="92" width="364" height="12" rx="6" fill="#0b0d11"/>
      <rect x="12" y="92" width="330" height="12" rx="6" fill="#3b82f6"/>
      <rect x="344" y="92" width="32" height="12" rx="6" fill="#10b981"/>
      <text x="194" y="122" text-anchor="middle" fill="#6b7280" font-size="9">Token flow: Original context → Compressed context (99% reduction)</text>
    </g>
  </g>

  <!-- Token counting label -->
  <text x="645" y="492" text-anchor="middle" fill="#4b5563" font-size="10">Token counts via gpt-tokenizer (cl100k_base) — real measurements, not estimates</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
